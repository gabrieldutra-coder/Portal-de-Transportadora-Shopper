<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Transportadora</title>
  <link rel="stylesheet" href="whatsapp.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

  <div class="wa-app">
    <!-- Topbar -->
    <header class="wa-topbar">
      <div class="wa-avatar"><i class="fa-sharp fa-solid fa-car"></i>
      </div>
      <div class="wa-title">
        <div class="wa-sub" id="waSub">TRANSPORTADORA ID: <class="wa-name" id="waName">Transportadora></div>
      </div>

      <div class="wa-top-actions">
        <button class="icon-btn" id="logoutBtn" title="Sair">
          <i class="fa-sharp-duotone fa-solid fa-door-open"></i>
        </button>
      </div>
    </header>

    <!-- Controles -->
    <div class="wa-chat">
      <div class="top-area">
        <div class="periodo-bar">
          <select id="setorSelect" class="wa-tab wa-tab--active">
            <option value="setorSelect" selected disabled>👉CLIQUE AQUI PARA ESCOLHER O SETOR👈</option>
            <option value="demo">[FINANCEIRO] - DEMONSTRATIVO</option>
            <option value="cestas">[QUALIDADE] - CESTAS</option>
            <option value="qualidade">[QUALIDADE] - CLASSIFICAÇÃO</option>
            <option value="erros">[QUALIDADE] - ERROS</option>
          </select>


          <select id="periodoSelect" class="wa-select" disabled>
            <option value="">Selecione o período</option>
          </select>
        </div>

        <div class="actions-bar">
          <button id="copyBtn" class="wa-btn">Copiar</button>
          <button id="pdfBtn" class="wa-btn wa-btn-secondary">Gerar PDF</button>
        </div>
      </div>

      <!-- Área do chat -->

      <div class="wa-message wa-out">
        <div class="wa-bubble" id="pdfBubble">
          <div class="wa-bubble-title" id="titulo">Carregando...</div>
          <div class="wa-text" id="mensagemBox">Carregando demonstrativo...</div>
          <div class="wa-media" id="mediaBox" style="display:none"></div>
          <div class="wa-meta">
          </div>
        </div>
      </div>
    </div>
    </main>

  </div>

  <script src="config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="dashboard.js"></script>
</body>

</html>
